<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CYMEDIA - Hero Section</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#050914;
    color:white;
    overflow-x:hidden;
}

/* HERO */

.hero-section{
    min-height:100vh;

    display:grid;
    grid-template-columns:1fr 1fr;

    align-items:center;

    gap:80px;

    padding:100px 7%;

    background:
    radial-gradient(circle at 20% 20%, rgba(109,92,255,.18), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(255,79,195,.16), transparent 30%),
    #050914;

    overflow:hidden;
}

/* LEFT */

.hero-content{
    position:relative;
    z-index:2;
}

.eyebrow{
    display:flex;
    align-items:center;
    gap:10px;

    color:#ff4fc3;

    text-transform:uppercase;

    letter-spacing:3px;

    font-size:13px;
    font-weight:800;

    margin-bottom:24px;
}

.dot{
    width:10px;
    height:10px;

    border-radius:50%;

    background:#ff4fc3;

    box-shadow:
    0 0 15px #ff4fc3;
}

.hero-content h1{
    font-size:clamp(50px,7vw,92px);

    line-height:.95;

    margin-bottom:28px;

    font-weight:900;
}

.hero-content h1 span{
    background:
    linear-gradient(
        135deg,
        #6d5cff,
        #ff4fc3
    );

    -webkit-background-clip:text;
    color:transparent;
}

.hero-content p{
    color:#aab1cc;

    font-size:19px;

    line-height:1.9;

    max-width:620px;

    margin-bottom:40px;
}

/* BUTTONS */

.hero-buttons{
    display:flex;
    gap:18px;

    flex-wrap:wrap;
}

.primary-btn{
    border:none;

    padding:18px 34px;

    border-radius:999px;

    background:
    linear-gradient(
        135deg,
        #6d5cff,
        #ff4fc3
    );

    color:white;

    font-weight:800;

    font-size:15px;

    cursor:pointer;

    box-shadow:
    0 18px 45px rgba(255,79,195,.28);

    transition:.3s ease;
}

.primary-btn:hover{
    transform:translateY(-4px);

    box-shadow:
    0 24px 70px rgba(255,79,195,.45);
}

.secondary-btn{
    border:1px solid rgba(255,255,255,.12);

    background:rgba(255,255,255,.04);

    color:white;

    padding:18px 28px;

    border-radius:999px;

    font-weight:700;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:.3s ease;
}

.secondary-btn:hover{
    background:rgba(255,255,255,.08);
}

/* RIGHT */

.hero-visual{
    position:relative;

    min-height:800px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* GLOW */

.hero-visual::before{
    content:"";

    position:absolute;

    width:700px;
    height:700px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,79,195,.16),
        transparent 60%
    );

    filter:blur(40px);

    z-index:0;
}

/* PHONE IMAGE */

.phone-image{
    position:relative;

    width:420px;

    z-index:2;

    animation:float 5s ease-in-out infinite;

    filter:
    drop-shadow(0 50px 90px rgba(0,0,0,.5))
    drop-shadow(0 0 45px rgba(255,79,195,.16));
}

/* FLOATING CARDS */

.floating-card{
    position:absolute;

    padding:18px 22px;

    border-radius:22px;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    box-shadow:
    0 25px 70px rgba(0,0,0,.35);

    z-index:3;

    animation:floatCard 4s ease-in-out infinite;
}

.floating-card strong{
    display:block;

    font-size:32px;

    margin-bottom:6px;
}

.floating-card span{
    color:#b8bfd8;

    font-size:14px;
}

/* CARD POSITIONS */

.card-one{
    top:120px;
    left:0;

    animation-delay:0s;
}

.card-two{
    right:0;
    top:230px;

    animation-delay:1s;
}

.card-three{
    left:40px;
    bottom:130px;

    animation-delay:2s;
}

.card-four{
    right:40px;
    bottom:100px;

    animation-delay:1.5s;
}

/* ANIMATIONS */

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

}

@keyframes floatCard{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

}

/* RESPONSIVE */

@media(max-width:1100px){

    .hero-section{
        grid-template-columns:1fr;
    }

    .hero-visual{
        min-height:700px;
    }

}

@media(max-width:700px){

    .hero-content h1{
        font-size:58px;
    }

    .phone-image{
        width:300px;
    }

    .floating-card{
        transform:scale(.85);
    }

    .card-one{
        top:60px;
        left:-10px;
    }

    .card-two{
        right:-10px;
        top:180px;
    }

    .card-three{
        left:0;
        bottom:100px;
    }

    .card-four{
        right:0;
        bottom:80px;
    }

}

</style>
</head>

<body>

<section class="hero-section">

    <!-- LEFT -->

    <div class="hero-content">

        <div class="eyebrow">
            <div class="dot"></div>
            YOUR GROWTH PARTNER
        </div>

        <h1>
            We Turn
            Attention Into
            <span>Revenue.</span>
        </h1>

        <p>
            Video scripting, social media strategy,
            branding, ads, content systems and digital growth —
            built for modern brands.
        </p>

        <div class="hero-buttons">

            <button class="primary-btn">
                Start Your Brand →
            </button>

            <button class="secondary-btn">
                Watch Showreel
            </button>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="hero-visual">

        <img
            src="./images/cymedia-phone.png"
            alt=""
            class="phone-image"
        >

        <div class="floating-card card-one">
            <strong>+320%</strong>
            <span>Engagement Growth</span>
        </div>

        <div class="floating-card card-two">
            <strong>Scripts</strong>
            <span>Hook-driven content</span>
        </div>

        <div class="floating-card card-three">
            <strong>2.4M</strong>
            <span>Views Generated</span>
        </div>

        <div class="floating-card card-four">
            <strong>12x</strong>
            <span>ROAS Performance</span>
        </div>

    </div>

</section>

</body>
</html>
